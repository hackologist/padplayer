<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#020617" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

    <!-- Primary SEO -->
    <title>Free Worship Pad Player | Online Worship & Drone Pads in All Keys</title>
    <meta
      name="description"
      content="A free online worship pad player. Play worship pads and drone pads in all 12 keys right in your browser — no download, no sign up. Built for worship leaders and musicians by Kairo Audio."
    />
    <meta
      name="keywords"
      content="free worship pad player, online worship pad player, online drone pad player, worship pads, drone pads"
    />
    <meta name="author" content="Kairo Audio" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://onlinepadplayer.com/" />

    <!-- Favicon (you will add /favicon.svg in the public folder) -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <!-- Preload the self-hosted headline font so it paints fast -->
    <link
      rel="preload"
      href="/fonts/anton-latin.woff2"
      as="font"
      type="font/woff2"
      crossorigin
    />

    <!-- Open Graph (Facebook, iMessage, LinkedIn, etc.) -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Online Pad Player" />
    <meta property="og:url" content="https://onlinepadplayer.com/" />
    <meta
      property="og:title"
      content="Free Worship Pad Player | Online Worship & Drone Pads in All Keys"
    />
    <meta
      property="og:description"
      content="A free online worship pad player. Play worship pads and drone pads in all 12 keys right in your browser — no download, no sign up."
    />
    <meta property="og:image" content="https://onlinepadplayer.com/og-image.jpg" />

    <!-- Twitter / X card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta
      name="twitter:title"
      content="Free Worship Pad Player | Online Worship & Drone Pads in All Keys"
    />
    <meta
      name="twitter:description"
      content="A free online worship pad player. Play worship pads and drone pads in all 12 keys right in your browser — no download, no sign up."
    />
    <meta name="twitter:image" content="https://onlinepadplayer.com/og-image.jpg" />

    <!-- Structured data: free WebApplication published by Kairo Audio -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebApplication",
        "name": "Online Pad Player",
        "url": "https://onlinepadplayer.com/",
        "description": "A free online worship pad player. Play worship pads and drone pads in all 12 keys right in your browser — no download, no sign up.",
        "applicationCategory": "MultimediaApplication",
        "operatingSystem": "Any (web browser)",
        "browserRequirements": "Requires JavaScript",
        "inLanguage": "en",
        "offers": {
          "@type": "Offer",
          "price": "0",
          "priceCurrency": "USD"
        },
        "publisher": {
          "@type": "Organization",
          "name": "Kairo Audio",
          "url": "https://kairoaudio.com"
        }
      }
    </script>
  </head>
  <body>
    <!-- Instant-paint shell: shows branded content + spinner immediately on
         the dark background, so mobile users see something the moment the
         HTML arrives instead of staring at a blank screen while the JS
         bundle downloads and parses. React replaces #root on mount. -->
    <div id="root">
      <div style="min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:3rem 1.5rem;text-align:center;font-family:system-ui,-apple-system,'Segoe UI',Roboto,sans-serif;color:#e2e8f0">
        <div style="width:60px;height:60px;border-radius:9999px;border:3px solid rgba(129,140,248,.35);border-top-color:#7c3aed;animation:pp-spin 1s linear infinite"></div>
        <h1 style="margin:1.6rem 0 0;font-family:'Anton',Impact,sans-serif;font-weight:400;text-transform:uppercase;font-size:2.25rem;line-height:.95;letter-spacing:-.01em;color:#f1f5f9">Online Worship Pad Player</h1>
        <p style="margin:.75rem 0 0;font-size:.7rem;letter-spacing:.3em;text-transform:uppercase;color:rgba(165,180,252,.7)">By Kairo Audio</p>
      </div>
    </div>
    <style>@keyframes pp-spin{to{transform:rotate(360deg)}}</style>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
