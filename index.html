<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#020617" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

    <!-- Primary SEO -->
    <title>Free Worship Pad Player | Online Worship & Drone Pads in All Keys</title>
    <meta
      name="description"
      content="A free online worship pad player. Play worship pads and drone pads in all 12 keys right in your browser — no download, no sign up. Built for worship leaders and musicians by Kairo Audio."
    />
    <meta
      name="keywords"
      content="free worship pad player, online worship pad player, online drone pad player, worship pads, drone pads"
    />
    <meta name="author" content="Kairo Audio" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://onlinepadplayer.com/" />

    <!-- Favicons: .ico + raster PNGs so Google Search and all browsers show
         the brand icon (Google's crawler needs /favicon.ico + a square raster,
         not an SVG-only icon). -->
    <link rel="icon" href="/favicon.ico" sizes="any" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" sizes="96x96" href="/favicon-96.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/favicon-180.png" />
    <link rel="manifest" href="/site.webmanifest" />

    <!-- Preload the self-hosted headline font so it paints fast -->
    <link
      rel="preload"
      href="/fonts/anton-latin.woff2"
      as="font"
      type="font/woff2"
      crossorigin
    />

    <!-- Open Graph (Facebook, iMessage, LinkedIn, etc.) -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Online Pad Player" />
    <meta property="og:url" content="https://onlinepadplayer.com/" />
    <meta
      property="og:title"
      content="Free Worship Pad Player | Online Worship & Drone Pads in All Keys"
    />
    <meta
      property="og:description"
      content="A free online worship pad player. Play worship pads and drone pads in all 12 keys right in your browser — no download, no sign up."
    />
    <meta property="og:image" content="https://onlinepadplayer.com/og-image.jpg" />

    <!-- Twitter / X card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta
      name="twitter:title"
      content="Free Worship Pad Player | Online Worship & Drone Pads in All Keys"
    />
    <meta
      name="twitter:description"
      content="A free online worship pad player. Play worship pads and drone pads in all 12 keys right in your browser — no download, no sign up."
    />
    <meta name="twitter:image" content="https://onlinepadplayer.com/og-image.jpg" />

    <!-- Structured data: free WebApplication published by Kairo Audio -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebApplication",
        "name": "Online Pad Player",
        "url": "https://onlinepadplayer.com/",
        "description": "A free online worship pad player. Play worship pads and drone pads in all 12 keys right in your browser — no download, no sign up.",
        "applicationCategory": "MultimediaApplication",
        "operatingSystem": "Any (web browser)",
        "browserRequirements": "Requires JavaScript",
        "inLanguage": "en",
        "offers": {
          "@type": "Offer",
          "price": "0",
          "priceCurrency": "USD"
        },
        "publisher": {
          "@type": "Organization",
          "name": "Kairo Audio",
          "url": "https://kairoaudio.com"
        }
      }
    </script>
  </head>
  <body>
    <!-- Instant-paint loading screen: pure inline HTML/CSS so it renders the
         moment the HTML arrives (before the JS bundle downloads/parses). On a
         fast connection it barely flashes; on a slow one it shows a branded,
         on-theme animation — a breathing play button with sound-wave ripples.
         React replaces #root on mount. -->
    <div id="root">
      <div class="pp-load">
        <div class="pp-orb">
          <span class="pp-ring"></span>
          <span class="pp-ring pp-ring2"></span>
          <span class="pp-ring pp-ring3"></span>
          <span class="pp-core">
            <svg width="32" height="32" viewBox="0 0 24 24" aria-hidden="true"><path d="M8 5v14l11-7z" fill="#fff"/></svg>
          </span>
        </div>
        <h1 class="pp-title">Online Worship Pad Player</h1>
        <p class="pp-sub">By Kairo Audio</p>
      </div>
    </div>
    <style>
      .pp-load{min-height:100vh;min-height:100dvh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:3rem 1.5rem;text-align:center;font-family:system-ui,-apple-system,'Segoe UI',Roboto,sans-serif;color:#e2e8f0}
      .pp-orb{position:relative;width:120px;height:120px;display:flex;align-items:center;justify-content:center;margin-bottom:2rem}
      .pp-ring{position:absolute;inset:0;border-radius:9999px;border:2px solid #818cf8;opacity:0;animation:pp-ripple 2.4s cubic-bezier(.2,.6,.3,1) infinite}
      .pp-ring2{animation-delay:.8s}
      .pp-ring3{animation-delay:1.6s}
      .pp-core{position:relative;width:80px;height:80px;border-radius:9999px;display:flex;align-items:center;justify-content:center;padding-left:4px;background:linear-gradient(135deg,#818cf8,#7c3aed);box-shadow:0 0 36px 0 rgba(124,58,237,.55);animation:pp-breathe 2.4s ease-in-out infinite}
      .pp-title{margin:0;font-family:'Anton',Impact,sans-serif;font-weight:400;text-transform:uppercase;font-size:2.25rem;line-height:.95;letter-spacing:-.01em;color:#f1f5f9}
      .pp-sub{margin:.85rem 0 0;font-size:.7rem;letter-spacing:.3em;text-transform:uppercase;color:rgba(165,180,252,.7)}
      @keyframes pp-ripple{0%{transform:scale(.55);opacity:.55}100%{transform:scale(1.9);opacity:0}}
      @keyframes pp-breathe{0%,100%{transform:scale(1);box-shadow:0 0 28px 0 rgba(124,58,237,.45)}50%{transform:scale(1.07);box-shadow:0 0 56px 8px rgba(124,58,237,.72)}}
      @media (prefers-reduced-motion:reduce){.pp-ring,.pp-core{animation:none}}
    </style>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
